name: Render 24/7 Keep Alive

on:
  schedule:
    # Run every 10 minutes to prevent Render free tier 15-minute spin-down
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ping-render-services:
    name: Ping Render Backend & Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Ping Backend Health Endpoint
        run: |
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            # Default fallback URL if secret not set
            BACKEND_URL="https://frontend-aykz.onrender.com/api/v1/health"
          fi
          echo "Pinging Backend at: $BACKEND_URL"
          curl -s -o /dev/null -w "%{http_code}\n" "$BACKEND_URL" || true

      - name: Ping Frontend Endpoint
        run: |
          FRONTEND_URL="${{ secrets.RENDER_FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="https://frontend-aykz.onrender.com"
          fi
          echo "Pinging Frontend at: $FRONTEND_URL"
          curl -s -o /dev/null -w "%{http_code}\n" "$FRONTEND_URL" || true
