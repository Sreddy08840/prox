name: PropX CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Lint & Validation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Verify Backend builds cleanly
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Backend Lint Audit
        run: |
          cd backend
          npm run lint

      - name: Validate Backend Compile Build
        run: |
          cd backend
          npm run build

      # Verify Frontend builds cleanly
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Lint Audit
        run: |
          cd frontend
          npm run lint

      - name: Validate Frontend Compile Build
        run: |
          cd frontend
          npm run build

  docker-build-check:
    name: Build & Validate Docker Containers
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: orgs/setup-buildx-action@v3
        continue-on-error: true

      - name: Build Backend Image
        run: |
          docker build -t propx-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t propx-frontend:latest ./frontend
