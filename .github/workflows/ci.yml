name: PropX CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend CI (Node & Prisma)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: propx_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Backend Linter
        working-directory: ./backend
        run: npm run lint

      - name: Generate Prisma Client
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/propx_db_test?schema=public
        run: npx prisma generate

      - name: Run Database Migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/propx_db_test?schema=public
        run: npx prisma migrate deploy

      - name: Build Backend
        working-directory: ./backend
        run: npm run build

  frontend-test:
    name: Frontend CI (Vite & React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Frontend Linter
        working-directory: ./frontend
        run: npm run lint

      - name: Build Frontend React Bundle
        working-directory: ./frontend
        run: npm run build
