services:
  - type: redis
    name: propx-redis
    plan: free
    ipAllowList: [] # Only allow internal connection

  - type: web
    name: backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: propx-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WHATSAPP_VERIFY_TOKEN
        value: propx_token
      - key: WHATSAPP_TOKEN
        value: mock_token
      - key: WHATSAPP_PHONE_NUMBER_ID
        value: mock_number_id
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000

  - type: web
    name: frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: BACKEND_HOST
        fromService:
          name: backend
          type: web
          property: host
